<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SSC 2026 — Shift Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1714;
  --cream: #f2ede4;
  --blue: #2D4B8E;
  --red: #C0392B;
  --gold: #C9A84C;
  --green: #2D6A4F;
  --purple: #6B3A7A;
  --brown: #7A5C3A;
  --white: #ffffff;
  --border: #d4cbbf;
  --muted: #888880;
  --lgray: #f5f5f3;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Courier Prime', monospace; background: var(--cream); color: var(--ink); min-height: 100vh; max-width: 480px; margin: 0 auto; }
.oswald { font-family: 'Oswald', sans-serif; }

/* HEADER */
.header { background: var(--ink); color: white; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 6px; }
.header-title { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 15px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.header-sub { font-size: 8px; letter-spacing: 0.2em; opacity: 0.4; text-transform: uppercase; margin-top: 2px; }
.header-user { text-align: right; }
.header-user-name { font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--gold); letter-spacing: 0.08em; }
.header-user-label { font-size: 8px; opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }
.nav-row { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 8px; }
.month-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: none; border: none; color: rgba(255,255,255,0.45); font-size: 22px; cursor: pointer; padding: 4px 6px; line-height: 1; }
.month-label { font-family: 'Oswald', sans-serif; color: white; font-size: 16px; font-weight: 600; letter-spacing: 0.06em; }
.view-btns { display: flex; gap: 4px; }
.view-btn { background: transparent; border: 1px solid rgba(201,168,76,0.3); color: rgba(201,168,76,0.6); font-family: 'Oswald', sans-serif; font-size: 9px; padding: 3px 8px; letter-spacing: 0.1em; cursor: pointer; }
.view-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }
.switch-btn { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.35); font-family: 'Oswald', sans-serif; font-size: 8px; padding: 3px 7px; letter-spacing: 0.08em; cursor: pointer; }
.day-headers { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--blue); }
.day-header { text-align: center; padding: 5px 0; font-family: 'Oswald', sans-serif; color: rgba(255,255,255,0.65); font-size: 8px; letter-spacing: 0.1em; }

/* MY SHIFTS BAR */
.stats-bar { background: var(--blue); color: rgba(255,255,255,0.6); padding: 5px 16px; display: flex; justify-content: space-between; font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 0.1em; }
.stats-bar strong { color: var(--gold); }
.live-dot { color: var(--green); }

/* LEGEND */
.legend { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
.legend-item { display: flex; align-items: center; gap: 3px; font-family: 'Oswald', sans-serif; font-size: 8px; letter-spacing: 0.05em; color: #666; }
.legend-dot { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }

/* CALENDAR GRID */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
.cal-cell { min-height: 64px; padding: 3px; background: white; cursor: default; overflow: hidden; position: relative; }
.cal-cell.has-events { cursor: pointer; background: #fafaf8; }
.cal-cell.today { outline: 2px solid var(--gold); outline-offset: -2px; }
.cal-cell.empty { background: #faf9f7; }
.cell-date { font-size: 10px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.cal-cell.today .cell-date { color: var(--gold); }
.event-chip { border-radius: 1px; padding: 1px 3px; margin-bottom: 1px; font-family: 'Oswald', sans-serif; font-size: 7px; letter-spacing: 0.03em; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-chip.mine { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7); }
.event-chip.pending { opacity: 0.6; }
.more-chip { font-size: 7px; color: #999; font-family: monospace; }

/* LIST VIEW */
.list-item { display: flex; align-items: stretch; margin: 0 12px 8px; border: 1px solid var(--border); background: white; cursor: pointer; }
.list-item.mine-item { border-color: var(--blue); }
.list-date-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 10px; min-width: 50px; color: white; }
.list-date-num { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; line-height: 1; }
.list-date-day { font-size: 8px; opacity: 0.8; }
.list-body { padding: 8px 12px; flex: 1; }
.list-name { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink); display: flex; justify-content: space-between; }
.list-meta { font-size: 9px; color: var(--muted); margin-top: 2px; }
.list-arrow { display: flex; align-items: center; padding: 0 10px; color: #ccc; font-size: 14px; }

/* MY SHIFTS VIEW */
.my-shifts-header { padding: 14px 16px 6px; }
.my-shifts-title { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.06em; color: var(--ink); }
.my-shifts-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
.my-shift-card { margin: 0 12px 10px; border: 1px solid var(--blue); overflow: hidden; }
.my-shift-top { background: var(--blue); color: white; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
.my-shift-name { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
.my-shift-date { font-size: 10px; opacity: 0.7; }
.my-shift-body { padding: 8px 14px; background: white; }
.my-shift-times { display: flex; gap: 16px; font-size: 10px; color: var(--muted); }
.my-shift-city { font-size: 10px; color: var(--muted); margin-top: 2px; }
.unclaim-btn { margin-top: 8px; width: 100%; padding: 7px; background: transparent; border: 1px solid var(--red); color: var(--red); font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; }
.empty-shifts { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 12px; }

/* BOTTOM BAR */
.bottom-bar { background: var(--ink); color: rgba(255,255,255,0.4); padding: 7px 16px; display: flex; justify-content: space-between; font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 0.1em; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--cream); width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; border-radius: 14px 14px 0 0; }
.modal-header { background: var(--ink); color: var(--gold); padding: 14px 18px; border-radius: 14px 14px 0 0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
.modal-title { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
.modal-date { font-size: 9px; letter-spacing: 0.15em; opacity: 0.55; text-transform: uppercase; margin-bottom: 2px; }
.modal-close { background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); width: 30px; height: 30px; border-radius: 2px; cursor: pointer; font-size: 16px; line-height: 1; }
.ev-color-bar { padding: 9px 18px; display: flex; justify-content: space-between; align-items: center; }
.ev-name { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: white; }
.ev-location { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.ev-pending-badge { background: rgba(255,255,255,0.2); font-size: 8px; padding: 2px 8px; border-radius: 10px; color: white; font-family: 'Oswald', sans-serif; letter-spacing: 0.1em; }
.times-grid { display: grid; grid-template-columns: repeat(4,1fr); background: white; border-bottom: 1px solid #eee; }
.time-cell { padding: 7px 10px; border-right: 1px solid #eee; }
.time-label { font-size: 7px; letter-spacing: 0.12em; color: #aaa; text-transform: uppercase; }
.time-val { font-size: 11px; font-weight: 700; color: var(--ink); margin-top: 1px; }
.crew-section { padding: 10px 18px; background: #fafaf8; border-bottom: 1px solid #eee; }
.crew-label { font-family: 'Oswald', sans-serif; font-size: 8px; letter-spacing: 0.12em; color: #aaa; text-transform: uppercase; margin-bottom: 6px; }
.crew-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.crew-chip { padding: 3px 9px; border-radius: 10px; font-size: 10px; font-family: 'Courier Prime', monospace; }
.crew-chip.confirmed { background: var(--green); color: white; }
.crew-chip.claimed { background: var(--blue); color: white; }
.bid-section { padding: 12px 18px; background: white; }
.bid-label { font-family: 'Oswald', sans-serif; font-size: 8px; letter-spacing: 0.12em; color: #aaa; text-transform: uppercase; margin-bottom: 8px; }
.staff-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.staff-chip { padding: 5px 10px; border: 1px solid var(--border); background: #f9f8f6; color: #666; font-size: 10px; font-family: 'Courier Prime', monospace; cursor: pointer; border-radius: 2px; }
.staff-chip.selected { border: 2px solid var(--blue); background: #edf2f0; color: var(--blue); font-weight: 700; }
.bid-btn { width: 100%; padding: 13px; border: none; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; margin-bottom: 6px; }
.bid-btn.want { background: var(--red); color: white; }
.bid-btn.claimed { background: var(--blue); color: white; }
.bid-btn.full { background: #ddd; color: #999; cursor: default; }
.bid-note { font-size: 9px; color: #bbb; text-align: center; font-style: italic; }
.solo-note { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

/* TOAST */
.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 4px; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 0.08em; z-index: 2000; box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 320px; text-align: center; color: white; transition: opacity 0.3s; }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* NAME PICKER */
.name-picker { position: fixed; inset: 0; background: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; z-index: 2000; }
.picker-title { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 22px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
.picker-sub { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; }
.picker-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 320px; }
.picker-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: white; padding: 13px 20px; font-family: 'Courier Prime', monospace; font-size: 14px; cursor: pointer; text-align: left; border-radius: 2px; transition: background 0.12s; }
.picker-btn:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); }

@media (max-width: 360px) { .cal-cell { min-height: 54px; } .event-chip { font-size: 6px; } }
</style>
</head>
<body>

<div id="name-picker" class="name-picker">
  <div style="font-family:'Oswald',sans-serif;color:var(--gold);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:6px;">SOURDOUGH SOCIAL CLUB</div>
  <div class="picker-title">WHO ARE YOU?</div>
  <div class="picker-sub">Select your name to view &amp; bid on shifts</div>
  <div class="picker-list" id="picker-list"></div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">SSC 2026 Shifts</div>
        <div class="header-sub">Staff Shift Calendar</div>
      </div>
      <div class="header-user">
        <div class="header-user-label">Viewing as</div>
        <div class="header-user-name" id="user-display">—</div>
        <button class="switch-btn" onclick="switchUser()" style="margin-top:3px;">SWITCH</button>
      </div>
    </div>
    <div class="nav-row">
      <div class="month-nav">

      </div>
    </div>

  </div>

  <div class="stats-bar">
    <span>MY SHIFTS THIS MONTH: <strong id="my-count">0</strong></span>
    <span id="conn-status" class="live-dot">● LIVE</span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2D4B8E"></div>BiFM</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2D6A4F"></div>PT Market</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7A5C3A"></div>Concerts</div>

    <div class="legend-item"><div class="legend-dot" style="background:#C0392B"></div>Special</div>

  <div id="view-cal">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="view-list" style="display:none;padding:8px 0;"></div>

  <div class="bottom-bar" id="bottom-bar">

    <span id="bar-pending">0 PENDING</span>
    <span id="bar-total">0 TOTAL</span>

</div>

<div id="modal" class="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast" class="toast success" style="display:none;"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwb0JJ2FMqj3YgePFe3YiKs9AquaecfBqh-YAut3adssVXP_VxVinGWP3FlsUl_6OpOJQ/exec";

const STAFF = ["Zach Blea","Alex Arroyo","Audrey Benson","Alexandra Dillon","Bryton Hall","Anna Baker","Dylan Boyce","Baccari Lyle","Tyree Brownlow","Jayden Johnson","Casual Labor"];

const COLORS = {
  bifm:"#2D4B8E", pt:"#2D6A4F", concerts:"#7A5C3A",
  bloedel:"#6B3A7A", special:"#C0392B"
};

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// ── STATE ─────────────────────────────────────────────────────
let myName = localStorage.getItem('ssc_name') || null;
let currentMonth = new Date().getMonth() < 4 ? 4 : new Date().getMonth();
let currentYear = 2026;
let currentView = 'cal';
let claims = {};
let modalEventDate = null;
let modalEvents = null;

// ── EVENTS ────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

function genEvents(){
  const evs=[];
  let d;

  d=new Date(2026,3,25);
  while(d<=new Date(2026,9,31)){
    if(d.getDay()===6) evs.push({id:'bifm-'+fmtDate(d),date:new Date(d),type:'bifm',name:'SSC — BiFM Farmers Market',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Farmers Market Town Square',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob','Zach'],soloEvent:false,note:'Jacob & Zach confirmed. Crew full.'});
    d=new Date(d.getTime()+86400000);
  }

  d=new Date(2026,5,3);
  while(d<=new Date(2026,8,30)){
    if(d.getDay()===3) evs.push({id:'pt-'+fmtDate(d),date:new Date(d),type:'pt',name:'SSC — Port Townsend Wednesday Market',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Port Townsend',location:'Port Townsend Farmers Market',status:'CONFIRMED',maxStaff:1,confirmedStaff:['Jacob'],soloEvent:true,note:'Jacob solo.'});
    d=new Date(d.getTime()+86400000);
  }

  d=new Date(2026,5,10);
  while(d<=new Date(2026,9,31)){
    if(d.getDay()===3) evs.push({id:'cip-'+fmtDate(d),date:new Date(d),type:'concerts',name:'SSC — Concerts in the Park',setup:'3:00 PM',start:'5:00 PM',end:'9:00 PM',teardown:'10:00 PM',city:'Bainbridge Island',location:'Battle Point Park',status:'PENDING',maxStaff:3,confirmedStaff:[],soloEvent:false,note:'3 staff needed.'});
    d=new Date(d.getTime()+86400000);
  }

  const sp=[
    {date:new Date(2026,4,24),type:'bloedel',name:'SSC Pop-Up — Bloedel Reserve',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'1 open slot.'},
    {date:new Date(2026,4,31),type:'bloedel',name:'SSC Pop-Up — Bloedel Reserve',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'1 open slot.'},
    {date:new Date(2026,5,20),type:'bloedel',name:'SSC — Pride Pop-Up, Bloedel Reserve',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'1 open slot.'},
    {date:new Date(2026,5,27),type:'bloedel',name:'SSC — Bloedel Summer Event',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'1 open slot.'},
    {date:new Date(2026,6,3),type:'special',name:'SSC — July 3rd Street Dance',setup:'4:00 PM',start:'6:00 PM',end:'11:00 PM',teardown:'12:00 AM',city:'Bainbridge Island',location:'Winslow Way',status:'CONFIRMED',maxStaff:3,confirmedStaff:['Jacob','Zach'],soloEvent:false,note:'1 open slot. Big night.'},
    {date:new Date(2026,6,4),type:'special',name:'SSC — Sequim Independence Day',setup:'1:00 PM',start:'3:00 PM',end:'10:30 PM',teardown:'11:30 PM',city:'Sequim',location:'Carrie Blake Park',status:'PENDING',maxStaff:3,confirmedStaff:['Jacob','Zach'],soloEvent:false,note:'PENDING. 1 open slot.'},
    {date:new Date(2026,6,11),type:'special',name:'SSC — Rotary Auction',setup:'6:00 AM',start:'8:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'9100 Sportsman Club Rd',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob','Zach'],soloEvent:false,note:'Crew full.'},
    {date:new Date(2026,6,27),type:'bloedel',name:'SSC — Bloedel Summer Solstice Pop-Up',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'CONFIRMED',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'1 open slot.'},
    {date:new Date(2026,7,2),type:'bloedel',name:'SSC Pop-Up — Bloedel Reserve',setup:'8:00 AM',start:'10:00 AM',end:'2:00 PM',teardown:'3:00 PM',city:'Bainbridge Island',location:'Bloedel Reserve',status:'PENDING',maxStaff:2,confirmedStaff:['Jacob'],soloEvent:false,note:'PENDING.'},
    {date:new Date(2026,9,20),type:'special',name:'SSC — Haunted Hayride',setup:'TBD',start:'TBD',end:'TBD',teardown:'TBD',city:'Bainbridge Island',location:'TBD',status:'PENDING',maxStaff:3,confirmedStaff:[],soloEvent:false,note:'PENDING — times TBD.'},
  ];
  sp.forEach((s,i)=>evs.push({id:'special-'+i,...s}));
  return evs.sort((a,b)=>a.date-b.date);
}

const ALL_EVENTS = genEvents();

function eventsForDate(date){
  return ALL_EVENTS.filter(e=>sameDay(e.date,date));
}

// ── JSONP API ─────────────────────────────────────────────────
function apiFetch(params){
  return new Promise((resolve)=>{
    const cbName='ssc_cb_'+Date.now();
    const url=WEB_APP_URL+'?'+new URLSearchParams({...params,callback:cbName}).toString();
    window[cbName]=(data)=>{
      delete window[cbName];
      const el=document.getElementById(cbName);
      if(el) el.remove();
      resolve(data);
    };
    const script=document.createElement('script');
    script.id=cbName;
    script.src=url;
    script.onerror=()=>{ delete window[cbName]; script.remove(); resolve({success:false,message:'Connection error'}); };
    document.body.appendChild(script);
    setTimeout(()=>{ if(window[cbName]){ delete window[cbName]; const el=document.getElementById(cbName); if(el) el.remove(); resolve({success:false,message:'Timeout'}); } },8000);
  });
}

async function loadClaims(){
  try{
    const res=await apiFetch({action:'getAll'});
    if(res.success){ claims=res.data||{}; }
    updateConnStatus(true);
  }catch(e){ updateConnStatus(false); }
  render();
}

async function claimShift(ev, isMine){
  const key=fmtDate(ev.date)+'|'+ev.name;
  // Optimistic
  if(isMine){
    claims[key]=(claims[key]||[]).filter(n=>n!==myName);
  } else {
    if(!claims[key]) claims[key]=[];
    if(!claims[key].includes(myName)) claims[key].push(myName);
  }
  render();
  renderModal(modalEventDate, modalEvents);

  const res=await apiFetch({action:isMine?'unclaim':'claim',staff:myName,date:fmtDate(ev.date),event:ev.name});
  if(res&&res.success){
    showToast(isMine?'Shift withdrawn.':'Shift claimed! Jacob notified.',true);
    loadClaims();
  } else {
    showToast(res?.message||'Try again','error');
    loadClaims();
  }
}

// ── UI HELPERS ────────────────────────────────────────────────
function updateConnStatus(ok){
  const el=document.getElementById('conn-status');
  if(el){ el.textContent=ok?'● LIVE':'○ OFFLINE'; el.style.color=ok?'#6fcf97':'#aaa'; }
}

function showToast(msg, ok){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(ok==='error'||ok===false?'error':'success');
  t.style.display='block'; t.style.opacity='1';
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>{ t.style.display='none'; },300); },2500);
}

function getMyClaims(){
  return ALL_EVENTS.filter(ev=>{
    const key=fmtDate(ev.date)+'|'+ev.name;
    return (claims[key]||[]).includes(myName);
  });
}

function getMonthEvents(){
  return ALL_EVENTS.filter(e=>e.date.getFullYear()===currentYear&&e.date.getMonth()===currentMonth);
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  renderDayHeaders();
  if(currentView==='cal') renderCal();
  else if(currentView==='list') renderList();
  else if(currentView==='mine') renderMine();
  renderBottomBar();
  updateMyCount();
}

function renderDayHeaders(){
  const row=document.getElementById('day-headers-row');
  if(!row) return;
  if(currentView==='cal'){
    row.style.display='grid';
    row.innerHTML=DAYS.map(d=>`<div class="day-header">${d}</div>`).join('');
  } else { row.style.display='none'; }
}

function renderCal(){
  const grid=document.getElementById('cal-grid');
  if(!grid) return;
  const today=new Date();
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  let html='';

  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(currentYear,currentMonth,d);
    const evs=eventsForDate(date);
    const isToday=sameDay(date,today);
    const hasEvs=evs.length>0;
    html+=`<div class="cal-cell${hasEvs?' has-events':''}${isToday?' today':''}" ${hasEvs?`onclick="openModal('${fmtDate(date)}')"`:''}>`;
    html+=`<div class="cell-date">${d}</div>`;
    evs.slice(0,3).forEach(ev=>{
      const key=fmtDate(ev.date)+'|'+ev.name;
      const mine=(claims[key]||[]).includes(myName);
      const shortName=ev.name.replace('SSC — ','').replace('SSC Pop-Up — ','').split(' ').slice(0,2).join(' ');
      html+=`<div class="event-chip${mine?' mine':''}${ev.status==='PENDING'?' pending':''}" style="background:${COLORS[ev.type]}">${mine?'✓ ':''}${shortName}</div>`;
    });
    if(evs.length>3) html+=`<div class="more-chip">+${evs.length-3}</div>`;
    html+=`</div>`;
  }
  grid.innerHTML=html;
}

function renderList(){
  const container=document.getElementById('view-list');
  if(!container) return;
  const evs=getMonthEvents();
  if(!evs.length){ container.innerHTML='<div style="text-align:center;padding:40px;color:#aaa;font-size:12px;">No events this month</div>'; return; }
  container.innerHTML=evs.map(ev=>{
    const key=fmtDate(ev.date)+'|'+ev.name;
    const mine=(claims[key]||[]).includes(myName);
    const shortName=ev.name.replace('SSC — ','').replace('SSC Pop-Up — ','');
    return `<div class="list-item${mine?' mine-item':''}" onclick="openModal('${fmtDate(ev.date)}','${ev.id}')">
      <div class="list-date-box" style="background:${COLORS[ev.type]}">
        <div class="list-date-num">${ev.date.getDate()}</div>
        <div class="list-date-day">${DAYS[ev.date.getDay()]}</div>
      </div>
      <div class="list-body">
        <div class="list-name"><span>${shortName}</span>${mine?`<span style="color:${COLORS[ev.type]};font-size:9px;">✓ IN</span>`:''}</div>
        <div class="list-meta">${ev.city} · ${ev.start}–${ev.end}</div>
        <div class="list-meta">Setup ${ev.setup} / Out ${ev.teardown}</div>
      </div>
      <div class="list-arrow">›</div>
    </div>`;
  }).join('');
}

function renderMine(){
  const container=document.getElementById('view-mine');
  if(!container) return;
  const mine=getMyClaims();
  const upcoming=mine.filter(e=>e.date>=new Date());
  const past=mine.filter(e=>e.date<new Date());

  let html=`<div class="my-shifts-header">
    <div class="my-shifts-title">${myName?.split(' ')[0]}'s Shifts</div>
    <div class="my-shifts-sub">${upcoming.length} upcoming · ${past.length} completed</div>
  </div>`;

  if(!mine.length){
    html+=`<div class="empty-shifts">No shifts claimed yet.<br>Tap events in the calendar to bid.</div>`;
  } else {
    if(upcoming.length){
      html+=`<div style="padding:8px 12px 4px;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaa;text-transform:uppercase;">Upcoming</div>`;
      upcoming.forEach(ev=>{
        const shortName=ev.name.replace('SSC — ','').replace('SSC Pop-Up — ','');
        html+=`<div class="my-shift-card">
          <div class="my-shift-top" style="background:${COLORS[ev.type]}">
            <div><div class="my-shift-name">${shortName}</div><div class="my-shift-date">${MONTHS[ev.date.getMonth()]} ${ev.date.getDate()}, ${ev.date.getFullYear()}</div></div>
          </div>
          <div class="my-shift-body">
            <div class="my-shift-times">
              <span>Setup ${ev.setup}</span><span>Start ${ev.start}</span><span>Out ${ev.teardown}</span>
            </div>
            <div class="my-shift-city">${ev.city} — ${ev.location}</div>
            <button class="unclaim-btn" onclick="unclaim('${ev.id}','${fmtDate(ev.date)}','${ev.name.replace(/'/g,"\\'")}')">WITHDRAW FROM SHIFT</button>
          </div>
        </div>`;
      });
    }
    if(past.length){
      html+=`<div style="padding:8px 12px 4px;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.12em;color:#aaa;text-transform:uppercase;">Completed</div>`;
      past.forEach(ev=>{
        const shortName=ev.name.replace('SSC — ','').replace('SSC Pop-Up — ','');
        html+=`<div class="my-shift-card" style="opacity:0.6;">
          <div class="my-shift-top" style="background:${COLORS[ev.type]}">
            <div><div class="my-shift-name">${shortName}</div><div class="my-shift-date">${MONTHS[ev.date.getMonth()]} ${ev.date.getDate()}</div></div>
          </div>
        </div>`;
      });
    }
  }
  container.innerHTML=html;
}

function renderBottomBar(){
  const evs=getMonthEvents();
  document.getElementById('bar-confirmed').textContent=evs.filter(e=>e.status==='CONFIRMED').length+' CONFIRMED';
  document.getElementById('bar-pending').textContent=evs.filter(e=>e.status==='PENDING').length+' PENDING';
  document.getElementById('bar-total').textContent=evs.length+' TOTAL';
}

function updateMyCount(){
  const evs=getMonthEvents();
  const count=evs.filter(ev=>{
    const key=fmtDate(ev.date)+'|'+ev.name;
    return (claims[key]||[]).includes(myName);
  }).length;
  const el=document.getElementById('my-count');
  if(el) el.textContent=count;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(dateStr, specificId){
  const parts=dateStr.split('-');
  const date=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  const evs=eventsForDate(date);
  modalEventDate=date; modalEvents=evs;
  renderModal(date,evs,specificId);
  document.getElementById('modal').style.display='flex';
}

function renderModal(date,evs,specificId){
  if(!date||!evs) return;
  const filteredEvs=specificId?evs.filter(e=>e.id===specificId):evs;
  const displayEvs=filteredEvs.length?filteredEvs:evs;

  let html=`<div class="modal-header">
    <div>
      <div class="modal-date">${MONTHS[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}</div>
      <div class="modal-title">${displayEvs.length} EVENT${displayEvs.length!==1?'S':''}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="text-align:right;">
        <div style="font-size:8px;color:rgba(201,168,76,0.5);letter-spacing:0.1em;">BIDDING AS</div>
        <div style="font-family:'Oswald',sans-serif;font-size:10px;color:var(--gold);">${myName}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
  </div>`;

  displayEvs.forEach(ev=>{
    const key=fmtDate(ev.date)+'|'+ev.name;
    const claimedStaff=claims[key]||[];
    const isMine=claimedStaff.includes(myName);
    const isFull=claimedStaff.length>=(ev.maxStaff||4)&&!isMine;
    const openSlots=(ev.maxStaff||4)-(ev.confirmedStaff||[]).length-claimedStaff.length;
    const shortName=ev.name.replace('SSC — ','').replace('SSC Pop-Up — ','');

    html+=`<div>
      <div class="ev-color-bar" style="background:${COLORS[ev.type]};opacity:${ev.status==='PENDING'?0.85:1};">
        <div>
          <div class="ev-name">${shortName}</div>
          <div class="ev-location">${ev.city} — ${ev.location}</div>
        </div>
        ${ev.status==='PENDING'?'<div class="ev-pending-badge">PENDING</div>':''}
      </div>
      <div class="times-grid">
        ${[['SETUP',ev.setup],['START',ev.start],['END',ev.end],['OUT',ev.teardown]].map(([l,t])=>`<div class="time-cell"><div class="time-label">${l}</div><div class="time-val">${t}</div></div>`).join('')}
      </div>`;

    // Crew
    const allCrew=[...(ev.confirmedStaff||[]).map(n=>({name:n,type:'confirmed'})),...claimedStaff.map(n=>({name:n,type:'claimed'}))];
    if(allCrew.length){
      html+=`<div class="crew-section">
        <div class="crew-label">Crew (${allCrew.length}/${ev.maxStaff||4})</div>
        <div class="crew-chips">${allCrew.map(c=>`<div class="crew-chip ${c.type}">${c.type==='confirmed'?'✓ ':''}${c.name}</div>`).join('')}</div>
      </div>`;
    }

    html+=`<div class="bid-section">`;
    if(ev.note) html+=`<div style="font-size:9px;color:#aaa;font-style:italic;margin-bottom:8px;">${ev.note}</div>`;

    if(ev.soloEvent){
      html+=`<div class="solo-note">Jacob solo event — no additional staff needed.</div>`;
    } else if((ev.confirmedStaff||[]).length>=(ev.maxStaff||4)){
      html+=`<div style="font-family:'Oswald',sans-serif;font-size:11px;color:var(--green);font-weight:700;padding:6px 0;letter-spacing:0.05em;">✓ CREW FULL</div>`;
    } else if(isMine){
      html+=`<button class="bid-btn claimed" onclick="doClaim('${ev.id}','${fmtDate(ev.date)}','${ev.name.replace(/'/g,"\\'")}',true)">✓ I'M IN — TAP TO WITHDRAW</button>`;
    } else if(isFull){
      html+=`<div class="bid-btn full">ALL SLOTS FILLED — Contact Jacob</div>`;
    } else {
      html+=`<button class="bid-btn want" onclick="doClaim('${ev.id}','${fmtDate(ev.date)}','${ev.name.replace(/'/g,"\\'")}',false)">I WANT THIS SHIFT</button>`;
    }
    html+=`<div class="bid-note">Jacob approves final assignments</div></div></div><div style="height:1px;background:var(--border);"></div>`;
  });

  document.getElementById('modal-content').innerHTML=html;
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal')){
    document.getElementById('modal').style.display='none';
    modalEventDate=null; modalEvents=null;
  }
}

async function doClaim(evId, dateStr, evName, isMine){
  const ev=ALL_EVENTS.find(e=>e.id===evId);
  if(!ev) return;
  await claimShift(ev, isMine);
}

async function unclaim(evId, dateStr, evName){
  const ev=ALL_EVENTS.find(e=>e.id===evId);
  if(!ev) return;
  const key=fmtDate(ev.date)+'|'+ev.name;
  claims[key]=(claims[key]||[]).filter(n=>n!==myName);
  render();
  renderMine();
  const res=await apiFetch({action:'unclaim',staff:myName,date:fmtDate(ev.date),event:ev.name});
  if(res?.success){ showToast('Shift withdrawn.',true); loadClaims(); }
  else { showToast(res?.message||'Error','error'); loadClaims(); }
}

// ── NAVIGATION ────────────────────────────────────────────────
function prevMonth(){
  if(currentMonth===0){ currentMonth=11; currentYear--; }
  else currentMonth--;
  render();
}
function nextMonth(){
  if(currentMonth===11){ currentMonth=0; currentYear++; }
  else currentMonth++;
  render();
}

function setView(v){
  currentView=v;
  ['cal','list','mine'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
    document.getElementById('btn-'+x).classList.toggle('active',x===v);
  });
  render();
}

// ── NAME PICKER ───────────────────────────────────────────────
function initPicker(){
  const list=document.getElementById('picker-list');
  list.innerHTML=STAFF.map(n=>`<button class="picker-btn" onclick="selectName('${n}')">${n}</button>`).join('');
}

function selectName(name){
  myName=name;
  localStorage.setItem('ssc_name',name);
  document.getElementById('name-picker').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-display').textContent=name.split(' ')[0];
  document.getElementById('month-label').textContent=MONTHS[currentMonth].toUpperCase()+' '+currentYear;
  loadClaims();
}

function switchUser(){
  localStorage.removeItem('ssc_name');
  myName=null;
  document.getElementById('name-picker').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ── INIT ──────────────────────────────────────────────────────
initPicker();
if(myName){
  selectName(myName);
} else {
  document.getElementById('name-picker').style.display='flex';
}
</script>
</body>
</html>
